name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

  workflow_dispatch: {}

concurrency:
  group: continuous-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build
        run: docker build --output dist .

      - name: Create Pages project (no-op if exists)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages project create bradenm-co-uk --production-branch=master
        continue-on-error: true

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy dist/ --project-name=bradenm-co-uk
